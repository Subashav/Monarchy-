<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MONARCHY</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body style="background: #000; color: #fff;">
    <header id="header">
        <div class="container nav">
            <a href="/index.html" class="logo">
                <img src="/logo.png" alt="Monarchy Logo">
            </a>
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/services.html">Services</a></li>
                <li><a href="/training.html">Training</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section class="hero" style="min-height: 50vh;">
            <div class="hero-visual"><canvas id="hero-galaxy" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6;"></canvas></div>
            <div class="container hero-content">
                <h1 class="reveal">Let's <br><span class="gradient-text">Connect.</span></h1>
                <p class="reveal">Ready to scale or start your career journey? Speak with our growth strategists today.</p>
            </div>
        </section>

        <section id="contact-details" style="padding: 10rem 0;">
            <div class="container">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start;">
                    <div class="reveal">
                        <h2 style="font-size: 2.2rem; margin-bottom: 2rem;">Work with <span class="gradient-text">Monarchy.</span></h2>
                        <ul style="list-style: none; display: flex; flex-direction: column; gap: 2rem;">
                            <li style="display: flex; gap: 1rem; align-items: center;">
                                <i data-lucide="mail" size="24"></i>
                                <span style="font-size: 1.1rem; color: var(--text-secondary);">contact@monarchy.company</span>
                            </li>
                            <li style="display: flex; gap: 1rem; align-items: center;">
                                <i data-lucide="map-pin" size="24"></i>
                                <span style="font-size: 1.1rem; color: var(--text-secondary);">Global Growth Hubs</span>
                            </li>
                        </ul>
                    </div>
                    <div class="glass reveal glow-card" style="padding: 3rem; border-radius: 24px;">
                        <h3 style="margin-bottom: 2rem;">Book Free Consultation</h3>
                        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                             <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                 <label style="font-size: 0.9rem; opacity: 0.6;">Name</label>
                                 <input type="text" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 12px; color: #fff;">
                             </div>
                             <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                 <label style="font-size: 0.9rem; opacity: 0.6;">Work Email</label>
                                 <input type="email" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 12px; color: #fff;">
                             </div>
                             <button class="btn btn-primary" style="margin-top: 1rem; justify-content: center;">Send Inquiry</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content"><div class="footer-copyright">&copy; 2026 MONARCHY. ALL RIGHTS RESERVED.</div></div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
